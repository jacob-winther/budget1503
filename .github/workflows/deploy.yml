name: Deploy to GitHub Pages
run-name: "Deploy - ${{ github.ref_name }} - ${{ github.event.head_commit.message || 'Manual trigger' }} - ${{ github.sha }}"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run coverage

      - name: Build
        run: npm run build

      - name: Copy coverage report into build output
        run: cp -r coverage dist/coverage

      - name: Write job summary
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          VERSION=$(node -p "require('./package.json').version")
          echo "## Deployed v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "Built from \`${SHORT_SHA}\` on \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Coverage report: https://jacob-winther.github.io/budget1503/coverage/" >> $GITHUB_STEP_SUMMARY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
