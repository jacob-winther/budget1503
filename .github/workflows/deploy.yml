name: Deploy to GitHub Pages
run-name: "Deploy - ${{ github.ref_name }} - ${{ github.event.head_commit.message || 'Manual trigger' }} - ${{ github.sha }}"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Update run title and write job summary
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          VERSION=$(node -p "require('./package.json').version")
          COMMIT_MSG="${{ github.event.head_commit.message || 'Manual trigger' }}"
          TITLE="Deploy - ${{ github.ref_name }} - ${COMMIT_MSG} - ${SHORT_SHA}"
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }} \
            --method PATCH \
            --field display_title="${TITLE}"
          echo "## Deployed v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "Built from \`${SHORT_SHA}\` on \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
